services:
  edge:
    image: caddy:2.10-alpine
    container_name: astra-intranet-modern-edge-dev
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    image: astra-intranet-web:dev
    container_name: astra-intranet-modern-web-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
    expose:
      - "3000"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    image: astra-intranet-api:dev
    container_name: astra-intranet-modern-api-dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      OpenEdge__Dsn: ${OPENEDGE_DSN:-}
      OpenEdge__ConnectionString: ${OPENEDGE_CONNECTION_STRING:-}
      OpenEdge__Host: ${OPENEDGE_HOST:-}
      OpenEdge__Port: ${OPENEDGE_PORT:-}
      OpenEdge__Database: ${OPENEDGE_DATABASE:-}
      OpenEdge__Username: ${OPENEDGE_USERNAME:-}
      OpenEdge__Password: ${OPENEDGE_PASSWORD:-}
      Bilhetagem__Directory__Provider: ${BILHETAGEM_DIRECTORY_PROVIDER:-auto}
      Bilhetagem__Directory__TableName: ${BILHETAGEM_DIRECTORY_TABLE_NAME:-}
      Bilhetagem__Calls__Provider: ${BILHETAGEM_CALLS_PROVIDER:-auto}
      Bilhetagem__Calls__CallsTableName: ${BILHETAGEM_CALLS_TABLE_NAME:-}
      Bilhetagem__Calls__DirectoryTableName: ${BILHETAGEM_CALLS_DIRECTORY_TABLE_NAME:-}
      Bilhetagem__Calls__UsersTableName: ${BILHETAGEM_CALLS_USERS_TABLE_NAME:-}
      Bilhetagem__Calls__DateField: ${BILHETAGEM_CALLS_DATE_FIELD:-data}
      Bilhetagem__Calls__TimeField: ${BILHETAGEM_CALLS_TIME_FIELD:-hora}
      Bilhetagem__Calls__ExtensionField: ${BILHETAGEM_CALLS_EXTENSION_FIELD:-ramal}
      Bilhetagem__Calls__NumberField: ${BILHETAGEM_CALLS_NUMBER_FIELD:-numero}
      Bilhetagem__Calls__DurationField: ${BILHETAGEM_CALLS_DURATION_FIELD:-duracao}
      Bilhetagem__Calls__TypeCodeField: ${BILHETAGEM_CALLS_TYPE_CODE_FIELD:-fl-ligacao}
      Bilhetagem__Calls__CityField: ${BILHETAGEM_CALLS_CITY_FIELD:-cidade}
      Bilhetagem__Calls__StateField: ${BILHETAGEM_CALLS_STATE_FIELD:-uf}
      Bilhetagem__Calls__CostField: ${BILHETAGEM_CALLS_COST_FIELD:-custo}
      Bilhetagem__Calls__DestinationField: ${BILHETAGEM_CALLS_DESTINATION_FIELD:-ramal-solicitado}
      Bilhetagem__Calls__OwnerIdField: ${BILHETAGEM_CALLS_OWNER_ID_FIELD:-fc-codigo}
      Bilhetagem__Calls__DirectoryNumberField: ${BILHETAGEM_CALLS_DIRECTORY_NUMBER_FIELD:-numero}
      Bilhetagem__Calls__DirectoryDescriptionField: ${BILHETAGEM_CALLS_DIRECTORY_DESCRIPTION_FIELD:-descricao}
      Bilhetagem__Calls__UserIdField: ${BILHETAGEM_CALLS_USER_ID_FIELD:-registro}
      Bilhetagem__Calls__UserNameField: ${BILHETAGEM_CALLS_USER_NAME_FIELD:-nome}
      DocWeb__Provider: ${DOCWEB_PROVIDER:-mock}
      ODBCINI: ${ODBCINI:-/etc/odbc.ini}
      ODBCSYSINI: ${ODBCSYSINI:-/etc}
      OPENEDGE_DRIVER_HOME: ${OPENEDGE_DRIVER_HOME:-/opt/openedge}
    volumes:
      - ../drivers/openedge:${OPENEDGE_DRIVER_HOME:-/opt/openedge}:ro
    expose:
      - "8080"

  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    image: astra-intranet-worker:dev
    container_name: astra-intranet-modern-worker-dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      OpenEdge__Dsn: ${OPENEDGE_DSN:-}
      OpenEdge__ConnectionString: ${OPENEDGE_CONNECTION_STRING:-}
      OpenEdge__Host: ${OPENEDGE_HOST:-}
      OpenEdge__Port: ${OPENEDGE_PORT:-}
      OpenEdge__Database: ${OPENEDGE_DATABASE:-}
      OpenEdge__Username: ${OPENEDGE_USERNAME:-}
      OpenEdge__Password: ${OPENEDGE_PASSWORD:-}
      Bilhetagem__Directory__Provider: ${BILHETAGEM_DIRECTORY_PROVIDER:-auto}
      Bilhetagem__Directory__TableName: ${BILHETAGEM_DIRECTORY_TABLE_NAME:-}
      Bilhetagem__Calls__Provider: ${BILHETAGEM_CALLS_PROVIDER:-auto}
      Bilhetagem__Calls__CallsTableName: ${BILHETAGEM_CALLS_TABLE_NAME:-}
      Bilhetagem__Calls__DirectoryTableName: ${BILHETAGEM_CALLS_DIRECTORY_TABLE_NAME:-}
      Bilhetagem__Calls__UsersTableName: ${BILHETAGEM_CALLS_USERS_TABLE_NAME:-}
      Bilhetagem__Calls__DateField: ${BILHETAGEM_CALLS_DATE_FIELD:-data}
      Bilhetagem__Calls__TimeField: ${BILHETAGEM_CALLS_TIME_FIELD:-hora}
      Bilhetagem__Calls__ExtensionField: ${BILHETAGEM_CALLS_EXTENSION_FIELD:-ramal}
      Bilhetagem__Calls__NumberField: ${BILHETAGEM_CALLS_NUMBER_FIELD:-numero}
      Bilhetagem__Calls__DurationField: ${BILHETAGEM_CALLS_DURATION_FIELD:-duracao}
      Bilhetagem__Calls__TypeCodeField: ${BILHETAGEM_CALLS_TYPE_CODE_FIELD:-fl-ligacao}
      Bilhetagem__Calls__CityField: ${BILHETAGEM_CALLS_CITY_FIELD:-cidade}
      Bilhetagem__Calls__StateField: ${BILHETAGEM_CALLS_STATE_FIELD:-uf}
      Bilhetagem__Calls__CostField: ${BILHETAGEM_CALLS_COST_FIELD:-custo}
      Bilhetagem__Calls__DestinationField: ${BILHETAGEM_CALLS_DESTINATION_FIELD:-ramal-solicitado}
      Bilhetagem__Calls__OwnerIdField: ${BILHETAGEM_CALLS_OWNER_ID_FIELD:-fc-codigo}
      Bilhetagem__Calls__DirectoryNumberField: ${BILHETAGEM_CALLS_DIRECTORY_NUMBER_FIELD:-numero}
      Bilhetagem__Calls__DirectoryDescriptionField: ${BILHETAGEM_CALLS_DIRECTORY_DESCRIPTION_FIELD:-descricao}
      Bilhetagem__Calls__UserIdField: ${BILHETAGEM_CALLS_USER_ID_FIELD:-registro}
      Bilhetagem__Calls__UserNameField: ${BILHETAGEM_CALLS_USER_NAME_FIELD:-nome}
      ODBCINI: ${ODBCINI:-/etc/odbc.ini}
      ODBCSYSINI: ${ODBCSYSINI:-/etc}
      OPENEDGE_DRIVER_HOME: ${OPENEDGE_DRIVER_HOME:-/opt/openedge}
    volumes:
      - ../drivers/openedge:${OPENEDGE_DRIVER_HOME:-/opt/openedge}:ro

volumes:
  caddy_data:
  caddy_config:
